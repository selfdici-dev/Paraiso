<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BECOME</title>

<style>
body{
margin:0;
font-family:-apple-system,system-ui;
background:#0d1117;
color:white;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:#161b22;
padding:18px;
border-radius:16px;
margin-bottom:16px;
}

.title{
font-size:12px;
color:#8b949e;
margin-bottom:6px;
}

.big{
font-size:22px;
font-weight:bold;
}

.action{
padding:14px;
background:#21262d;
border-radius:12px;
margin-top:10px;
cursor:pointer;
transition:0.2s;
}

.action.done{
opacity:0.3;
text-decoration:line-through;
}

.progress{
height:8px;
background:#21262d;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#238636;
width:0%;
}

.footer{
text-align:center;
margin-top:20px;
color:#8b949e;
font-size:12px;
}
</style>

</head>

<body>

<div class="header">BECOME</div>

<div class="container">

<div class="card">
<div class="title">MISSION DU JOUR</div>
<div id="mission" class="big"></div>
</div>

<div class="card">
<div class="title">ACTIONS</div>
<div id="actions"></div>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>

<div class="card">
<div class="title">CONSEIL</div>
<div id="tip"></div>
</div>

<div class="card">
<div class="title">PROGRESSION</div>
<div>Niveau <span id="level">1</span> — XP <span id="xp">0</span></div>
</div>

<div class="footer">
Discipline > Motivation
</div>

</div>

<script>

let state = JSON.parse(localStorage.getItem("final_clean")||"{}");
if(!state.xp) state.xp = 0;
if(!state.done) state.done = 0;

const missions = [
"Zéro téléphone 1h après réveil",
"Faire ce que tu évites",
"Focus profond 1h",
"Entraînement intense",
"Planifier ta journée",
"Pas de distraction aujourd’hui"
];

const actionsBase = [
"Commence maintenant",
"Lance un timer 25 min",
"Fais 10 pompes",
"Lis 5 pages",
"Ecris ton plan",
"Range ton espace",
"Respire et recentre-toi"
];

const tips = [
"Tu sais déjà quoi faire.",
"Arrête de réfléchir. Agis.",
"Ton téléphone est ton ennemi.",
"Fais le plus dur en premier.",
"Commencer est la clé.",
"Moins de choix = plus d’action.",
"Répéter > perfection.",
"Tu deviens ce que tu fais chaque jour.",
"Ton futur dépend d’aujourd’hui."
];

function generate(){

document.getElementById("mission").innerText =
missions[Math.floor(Math.random()*missions.length)];

const container = document.getElementById("actions");
container.innerHTML = "";
state.done = 0;

for(let i=0;i<3;i++){
const div = document.createElement("div");
div.className = "action";
div.innerText = actionsBase[Math.floor(Math.random()*actionsBase.length)];

div.onclick = ()=>{
if(!div.classList.contains("done")){
div.classList.add("done");
state.done++;
state.xp += 10;
update();
}
};

container.appendChild(div);
}

document.getElementById("tip").innerText =
tips[Math.floor(Math.random()*tips.length)];
}

function update(){

document.getElementById("xp").innerText = state.xp;

let level = Math.floor(state.xp / 100) + 1;
document.getElementById("level").innerText = level;

let progress = (state.done / 3) * 100;
document.getElementById("bar").style.width = progress + "%";

localStorage.setItem("final_clean", JSON.stringify(state));
}

generate();
update();

</script>

</body>
</html>
