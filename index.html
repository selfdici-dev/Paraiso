<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BECOME MAX</title>

<style>
:root{
--bg:#0a0f1a;
--card:#111827;
--accent:#2563eb;
--danger:#ef4444;
--success:#22c55e;
--text:#fff;
--muted:#9ca3af;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
background:var(--card);
}

.section{
padding:15px;
display:none;
}

.active{
display:block;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.btn{
background:var(--accent);
padding:12px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

.red{background:var(--danger);}
.green{background:var(--success);}

.big{font-size:22px;font-weight:bold;}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#0f172a;
}

.nav button{
flex:1;
padding:10px;
background:none;
border:none;
color:#9ca3af;
}

.active-btn{color:#2563eb;}
</style>

</head>

<body>

<div class="header">
BECOME MAX
<div>🔥 <span id="streak">0</span> | ⚡ <span id="xp">0</span></div>
</div>

<!-- ACTION -->
<div id="home" class="section active">

<h3>🎯 Plan du jour</h3>
<div id="plan" class="card big"></div>

<h3>⚔️ Action immédiate</h3>
<div id="action" class="card big"></div>

<div class="btn green" onclick="done()">J’ai agi</div>
<div class="btn red" onclick="fail()">J’ai échoué</div>

<h3>🧠 Coach intelligent</h3>
<div id="coach" class="card"></div>

<div class="btn red" onclick="reset()">⚡ Reset mental</div>

</div>

<!-- IDENTITE -->
<div id="identity" class="section">

<h3>🧬 Identité</h3>

<div class="card">
Score discipline: <span id="score">0</span>/100
</div>

<div class="card" id="identityText"></div>

</div>

<!-- CONSEILS -->
<div id="tips" class="section">

<h3>🧠 Conseils adaptés</h3>
<div id="tip" class="card"></div>

</div>

<!-- PROGRESSION -->
<div id="progress" class="section">

<h3>📈 Progression</h3>
<div class="card" id="level"></div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home',this)" class="active-btn">Action</button>
<button onclick="show('identity',this)">Identité</button>
<button onclick="show('tips',this)">Conseils</button>
<button onclick="show('progress',this)">Stats</button>
</div>

<script>

let state = JSON.parse(localStorage.getItem("max")||"{}");

if(!state.xp) state.xp=0;
if(!state.score) state.score=0;
if(!state.streak) state.streak=0;

function save(){
localStorage.setItem("max",JSON.stringify(state));
}

function generatePlan(){
if(state.score<30){
return "Commence simple: 1 action + pas de téléphone matin";
}
if(state.score<70){
return "2 blocs focus + discipline téléphone";
}
return "Optimise ta journée + dépasse-toi";
}

function generateAction(){
const list=[
"Commence maintenant",
"Lance un timer 25min",
"Fais 10 pompes",
"Ecris ton plan",
"Lis 5 pages"
];
return list[Math.floor(Math.random()*list.length)];
}

function generateCoach(){
if(state.score<30){
return "Tu es trop dispersé. Agis.";
}
if(state.score<70){
return "Tu progresses mais tu n’es pas constant.";
}
return "Tu es solide. Continue.";
}

function generateTip(){
if(state.score<30){
return "Supprime les distractions.";
}
if(state.score<70){
return "Structure ta journée.";
}
return "Augmente la difficulté.";
}

function update(){

document.getElementById("xp").innerText=state.xp;
document.getElementById("score").innerText=state.score;

document.getElementById("plan").innerText=generatePlan();
document.getElementById("action").innerText=generateAction();
document.getElementById("coach").innerText=generateCoach();
document.getElementById("tip").innerText=generateTip();

let level=Math.floor(state.xp/100)+1;
document.getElementById("level").innerText="Niveau "+level;

let text="";
if(state.score<30){
text="Tu es instable.";
}else if(state.score<70){
text="Tu progresses.";
}else{
text="Tu es discipliné.";
}

document.getElementById("identityText").innerText=text;

save();
}

function done(){
state.xp+=10;
state.score+=2;
state.streak+=1;
update();
}

function fail(){
state.score-=3;
alert("Reprends-toi.");
update();
}

function reset(){
alert("Bouge maintenant.");
state.score-=1;
update();
}

function show(v,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(v).classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active-btn"));
btn.classList.add("active-btn");
}

update();

</script>

</body>
</html>
