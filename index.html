<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BECOME ELITE</title>

<style>
:root{
--bg:#0a0f1a;
--card:#111827;
--accent:#2563eb;
--text:#fff;
--muted:#9ca3af;
--danger:#ef4444;
--success:#22c55e;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
background:var(--card);
font-weight:bold;
}

.stats{
font-size:12px;
color:var(--muted);
}

.section{
padding:15px;
display:none;
}

.section.active{
display:block;
}

.card{
background:var(--card);
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

.btn{
background:var(--accent);
padding:12px;
border-radius:10px;
text-align:center;
margin-top:10px;
cursor:pointer;
}

.btn-danger{
background:var(--danger);
}

.btn-success{
background:var(--success);
}

.done{
opacity:0.3;
text-decoration:line-through;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#0f172a;
}

.nav button{
flex:1;
padding:10px;
background:none;
border:none;
color:var(--muted);
}

.active-btn{
color:var(--accent);
}

.big{
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
BECOME
<div class="stats">
🔥 <span id="streak">0</span> | ⚡ <span id="xp">0</span>
</div>
</div>

<!-- HOME -->

<div id="home" class="section active">

<h3>🔥 Focus du jour</h3>
<div id="focus" class="card big"></div>
<div class="btn" onclick="newFocus()">Changer</div>

<h3>⚔️ Défis</h3>
<div id="challenges"></div>
<div class="btn" onclick="generate()">Générer</div>

<h3>🧠 Coach</h3>
<div id="coach" class="card"></div>

<div class="btn btn-danger" onclick="resetMental()">⚡ J'ai la flemme</div>

</div>

<!-- IDENTITY -->

<div id="identity" class="section">
<h3>🧬 Identité</h3>

<div class="card">
<div>Discipline</div>
<div class="big" id="disciplineScore">0%</div>
</div>

<div class="card" id="identityText"></div>

</div>

<!-- PROGRESS -->

<div id="progress" class="section">

<h3>📈 Progression</h3>

<div class="card" id="level"></div>

<div class="card">
Jours actifs: <span id="days">0</span>
</div>

</div>

<!-- NAV -->

<div class="nav">
<button onclick="show('home',this)" class="active-btn">Accueil</button>
<button onclick="show('identity',this)">Identité</button>
<button onclick="show('progress',this)">Progression</button>
</div>

<script>

let state = JSON.parse(localStorage.getItem("elite")||"{}");

if(!state.xp) state.xp = 0;
if(!state.streak) state.streak = 0;
if(!state.days) state.days = 0;
if(!state.doneToday) state.doneToday = false;

const focuses = [
"Zéro téléphone matin",
"Deep work 2x30min",
"1h entraînement",
"Lecture 20min",
"Planifier journée",
"Discipline totale aujourd’hui"
];

const challenges = [
"Douche froide",
"Pas de sucre",
"Pas de scroll",
"10 min méditation",
"Sortir zone confort",
"Faire quelque chose de dur"
];

const coach = [
"Tu n’es pas fatigué, tu es distrait.",
"Tu sais quoi faire.",
"Arrête de réfléchir.",
"Ton futur dépend d’aujourd’hui.",
"La discipline bat tout.",
"Tu deviens ce que tu répètes."
];

function save(){
localStorage.setItem("elite", JSON.stringify(state));
}

function newFocus(){
document.getElementById("focus").innerText =
focuses[Math.floor(Math.random()*focuses.length)];
}

function generate(){
const container = document.getElementById("challenges");
container.innerHTML = "";

for(let i=0;i<3;i++){
const c = challenges[Math.floor(Math.random()*challenges.length)];
const div = document.createElement("div");

div.className="card";
div.innerText = c;

div.onclick = ()=>{
div.classList.toggle("done");

if(div.classList.contains("done")){
state.xp += 10;

if(!state.doneToday){
state.days += 1;
state.streak += 1;
state.doneToday = true;
}

update();
}
};

container.appendChild(div);
}
}

function loadCoach(){
document.getElementById("coach").innerText =
coach[Math.floor(Math.random()*coach.length)];
}

function resetMental(){
alert("Bouge-toi. Fais UNE action maintenant.");
state.xp -= 5;
update();
}

function update(){

document.getElementById("xp").innerText = state.xp;
document.getElementById("streak").innerText = state.streak;
document.getElementById("days").innerText = state.days;

const level = Math.floor(state.xp/100)+1;

document.getElementById("level").innerText =
"Niveau "+level+" ("+state.xp+" XP)";

let score = Math.min(100, Math.floor(state.xp/10));
document.getElementById("disciplineScore").innerText = score+"%";

let text = "";

if(score<30){
text="Tu es encore instable. Tu dois prouver par l’action.";
}else if(score<60){
text="Tu progresses. Mais tu n’es pas encore fiable.";
}else if(score<80){
text="Tu deviens discipliné. Continue.";
}else{
text="Tu es au-dessus de la moyenne. Ne relâche pas.";
}

document.getElementById("identityText").innerText = text;

save();
}

function show(v,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(v).classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active-btn"));
btn.classList.add("active-btn");
}

newFocus();
generate();
loadCoach();
update();

</script>

</body>
</html>
